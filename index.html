<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <!-- Page Title -->
    <title>Inventory Management Dashboard</title>
    <!--Custom CSS-->
    <link rel="stylesheet" href="./Assets/css/style.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!--Bootstrap Icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-100">
    <!-- Main Layout -->
    <div class="flex h-screen">
        <!-- SIDEBAR-->
        <div id="sidebar" class="fixed top-0 left-0 z-50 w-64 h-full bg-teal-700 text-white p-5
                    transform -translate-x-full md:translate-x-0
                    transition-transform duration-300 ease-in-out">
            <!-- Logo -->
            <div class="flex items-center gap-3 mb-10">
                <div class="p-3 rounded-xl text-2xl text-teal-800 bg-white"><i class="bi bi-stack"></i></div>
                <h1 class="text-2xl font-bold mb-10 leading-tight">Inventory Management System </h1>
            </div>            
            <!-- Navigation -->
            <ul class="space-y-5">
                <li><a href="./index.html"class="flex items-center gap-3 bg-teal-900 p-3 rounded-lg">Dashboard</a></li>
                <li><a href="./products.html" class="flex items-center gap-3 hover:bg-teal-900 p-3 rounded-lg transition">Products</a></li>
                <li><a href="./reports.html" class="flex items-center gap-3 hover:bg-teal-900 p-3 rounded-lg transition"> Reports</a></li>
            </ul>
        </div>
        <!-- MAIN CONTENT  -->
        <div class="flex-1 md:ml-64 p-4 overflow-y-auto">
            <div class="bg-white shadow p-4 flex items-center justify-between border border-radius-lg">
                <!-- Mobile Toggle Button -->
                <button id="menuBtn" class="md:hidden text-2xl text-green-700">☰</i></button>
                <!-- Page Title -->
                <h2 class="text-xl font-bold text-gray-700">Inventory Dashboard</h2>
                <!--Profile-->
                <div class="flex items-center gap-3">
                    <img src="https://www.gravatar.com/avatar/2c7d99fe281ecd3bcd65ab915bac6dd5?s=250" class="w-10 h-10 rounded-full" alt="profile"/>
                    <div class="hidden sm:block">
                        <h3 class="font-semibold text-gray-700">Admin</h3>
                        <p class="text-sm text-gray-700">Manager</p>
                    </div>
                </div>
            </div>            

            <!-- Page Heading -->
            <h2 class="text-3xl font-bold text-gray-800">Dashboard</h2>
            <!-- Sub Heading -->
            <p class="text-gray-500 mt-2 mb-8">Welcome back! Here’s your inventory overview.</p>
            <!-- DASHBOARD CARDS-->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Total Products -->
                <div class="bg-white p-6 rounded-2xl shadow">
                    <h3 class="text-gray-500 text-lg">Total Products</h3>
                    <p id="totalProducts" class="text-4xl font-bold text-teal-700 mt-4">0</p>
                </div>
                <!-- In Stock -->
                <div class="bg-white p-6 rounded-2xl shadow">
                    <h3 class="text-gray-500 text-lg">In Stock</h3>
                    <p id="inStock" class="text-4xl font-bold text-blue-600 mt-4">0</p>
                </div>
                <!-- Out of Stock -->
                <div class="bg-white p-6 rounded-2xl shadow">
                    <h3 class="text-gray-500 text-lg">Out of Stock</h3>
                    <p id="outOfStock" class="text-4xl font-bold text-red-500 mt-4">0</p>
                </div>
                <!-- Categories -->
                <div class="bg-white p-6 rounded-2xl shadow">
                    <h3 class="text-gray-500 text-lg">Total Categories</h3>
                    <p id="totalCategories" class="text-4xl font-bold text-purple-600 mt-4">0</p>
                </div>
            </div>
            <!-- CHART SECTION-->
            <div class="bg-white p-6 rounded-xl shadow mt-6">
                <h3 class="text-xl font-bold mb-4">Products by Category</h3>
                <div style="width: 300px; height: 300px; margin: auto;">
                    <canvas id="categoryPieChart"></canvas>
                </div>
            </div>        

        </div>

    </div>

     <!-- ================= OVERLAY ================= -->
    <div id="overlay"
         class="fixed inset-0 bg-black bg-opacity-40 hidden md:hidden">
    </div>

    <script>
    // Sidebar
    const sidebar = document.getElementById("sidebar");
    // Toggle Button
    const menuBtn = document.getElementById("menuBtn");
    // Overlay
    const overlay = document.getElementById("overlay");
    // Open Sidebar
    menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
        });
    // Close Sidebar When Overlay Clicked
    overlay.addEventListener("click", () => {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
        });
    </script>
    <script src="./Assets/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./Assets/js/dashboard.js"></script>
    



</body>
</html>
