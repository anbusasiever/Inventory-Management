<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!--Bootstrap Icons-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <!-- Main Layout -->
    <div class="flex h-screen">
        <!-- SIDEBAR-->
        <div id="sidebar" class="fixed top-0 left-0 z-50 w-64 h-full bg-teal-700 text-white p-5
                    transform -translate-x-full md:translate-x-0
                    transition-transform duration-300 ease-in-out">
            <!-- Logo -->
            <div class="flex items-center gap-3 mb-10">
                <div class="p-3 rounded-xl text-2xl text-teal-800 bg-white"><i class="bi bi-stack"></i></div>
                <h1 class="text-2xl font-bold mb-10 leading-tight">Inventory Management System </h1>
            </div>            
            <!-- Navigation -->
            <ul class="space-y-5">
                <li><a href="./index.html"class="flex items-center gap-3 hover:bg-teal-900 p-3 rounded-lg transition">Dashboard</a></li>
                <li><a href="./products.html" class="flex items-center gap-3 hover:bg-teal-900 p-3 rounded-lg">Products</a></li>
                <li><a href="./reports.html" class="flex items-center gap-3 bg-teal-900 p-3 rounded-lg transition"> Reports</a></li>
            </ul>
        </div>
        <!-- MAIN CONTENT  -->
        <div class="flex-1 md:ml-64 p-4 overflow-y-auto">
            <div class="bg-white shadow p-4 flex items-center justify-between">
                <!-- Mobile Toggle Button -->
                <button id="menuBtn" class="md:hidden text-2xl text-green-700">☰</i></button>
                <!-- Page Title -->
                <h2 class="text-xl font-bold text-gray-700">Inventory Dashboard</h2>
                <!--Profile-->
                <div class="flex items-center gap-3">
                    <img src="https://i.pravatar.cc/40" class="w-10 h-10 rounded-full" alt="profile"/>
                    <div class="hidden sm:block">
                        <h3 class="font-semibold text-gray-700">Admin</h3>
                        <p class="text-sm text-gray-700">Manager</p>
                    </div>
                </div>
            </div>            

            <!-- Page Heading -->
            <h2 class="text-3xl font-bold text-gray-800 p-6">Reports</h2>
            <div class="flex flex-wrap gap-4 p-6">
                <button onclick="downloadCSV()" class="bg-gray-700 text-white px-6 py-3 rounded-lg hover:bg-gray-800">Download CSV</button>
                <button onclick="downloadExcel()" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">Download Excel</button>
                <button onclick="downloadPDF()" class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700">Download PDF</button>
            </div>
    </div>

     <!-- ================= OVERLAY ================= -->
    <div id="overlay"
         class="fixed inset-0 bg-black bg-opacity-40 hidden md:hidden">
    </div>

    <script>
    // Sidebar
    const sidebar = document.getElementById("sidebar");
    // Toggle Button
    const menuBtn = document.getElementById("menuBtn");
    // Overlay
    const overlay = document.getElementById("overlay");
    // Open Sidebar
    menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("-translate-x-full");
        overlay.classList.toggle("hidden");
        });
    // Close Sidebar When Overlay Clicked
    overlay.addEventListener("click", () => {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
        });
    </script>

    <script src="./Assets/js/script.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>   

    
</body>
</html>
